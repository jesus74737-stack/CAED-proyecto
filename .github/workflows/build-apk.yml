name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        working-directory: CAED/frontend
        run: npm install

      - name: Generate Keystore
        working-directory: CAED/frontend
        run: |
          keytool -genkey -v -keystore keystore.jks \
            -alias caed -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=CAED, OU=Dev, O=CAED, L=City, ST=State, C=CO" \
            -storepass caed1234 -keypass caed1234

      - name: Build APK
        working-directory: CAED/frontend
        run: eas build --platform android --profile preview --non-interactive --local
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CAED-APK
          path: CAED/frontend/build-*.apk
